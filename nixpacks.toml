[phases.setup]
nixPkgs = [
  "php83",
  "php83Extensions.pdo",
  "php83Extensions.pdo_pgsql",
  "php83Extensions.pgsql",
  "php83Extensions.mbstring",
  "php83Extensions.tokenizer",
  "php83Extensions.xml",
  "php83Extensions.ctype",
  "php83Extensions.fileinfo",
  "php83Extensions.openssl",
  "php83Extensions.curl",
  "composer"
]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader"]

[phases.build]
cmds = [
  "php artisan config:clear",
  "php artisan route:cache",
  "php artisan view:cache"
]

# config:cache va aquí (runtime) para que capture las env vars reales de Railway
# migrate corre en cada deploy para aplicar migraciones nuevas automáticamente
[start]
cmd = "php artisan config:cache && php artisan migrate --force && php artisan storage:link --force 2>/dev/null || true && php artisan serve --host=0.0.0.0 --port=$PORT"
